name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    # GitHub-hosted runners hard-cap job execution at 6 hours regardless of this value
    timeout-minutes: 360

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 2 -Force

          # Remove any existing rule with the same name to avoid duplication
          # (prints "No rules match the specified criteria" on first run - harmless, suppressed below)
          netsh advfirewall firewall delete rule name="RDP-Tailscale" | Out-Null

          # Only allow RDP from the Tailscale CGNAT range (100.64.0.0/10), not the whole internet
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 remoteip=100.64.0.0/10

          Restart-Service -Name TermService -Force

      - name: Create RDP User
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          if (-not $env:RDP_PASSWORD) {
              Write-Error "RDP_PASSWORD secret is not set. Add it under Settings > Secrets and variables > Actions, then re-run."
              exit 1
          }

          # Windows local accounts require 8+ chars and at least 3 of: upper, lower, digit, special.
          # Checking this ourselves gives a readable error instead of a bare InvalidPasswordException.
          $pwd = $env:RDP_PASSWORD
          $categories = 0
          if ($pwd -cmatch '[A-Z]') { $categories++ }
          if ($pwd -cmatch '[a-z]') { $categories++ }
          if ($pwd -match '[0-9]') { $categories++ }
          if ($pwd -match '[^a-zA-Z0-9]') { $categories++ }

          if ($pwd.Length -lt 8 -or $categories -lt 3) {
              Write-Error "RDP_PASSWORD does not meet Windows complexity requirements (8+ characters, at least 3 of: uppercase, lowercase, digit, special character). Update the secret and re-run."
              exit 1
          }

          $securePass = ConvertTo-SecureString $env:RDP_PASSWORD -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"
              exit 1
          }

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID

          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }

          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"

          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Maintain Connection
        run: |
          Write-Host "=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: use the value you stored in the RDP_PASSWORD secret"
          Write-Host "=================="

          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - cancel the workflow run to stop"
              Start-Sleep -Seconds 300
          }
